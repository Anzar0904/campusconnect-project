name: CampusConnect CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  # These are set in GitHub → Settings → Secrets and variables → Actions
  NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_DB_PASSWORD:          ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_ID:           ${{ secrets.SUPABASE_PROJECT_ID }}

jobs:
  # ── Job 1: Type-check + Lint ──────────────────────────────────────────
  typecheck-and-lint:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint -- --max-warnings 0

  # ── Job 2: Build ──────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build-time env vars must be available here
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── Job 3: Tests ──────────────────────────────────────────────────────
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Job 4: Security scan ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        # TODO: Re-enable blocking security audit before production launch.
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ── Job 5: DB Migration validation ───────────────────────────────────
  migrate-staging:
    name: Validate DB Migrations (Staging)
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration syntax
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Checking $f..."
            # Basic SQL syntax check — ensures no unclosed quotes etc.
            python3 -c "
          import sys
          content = open('$f').read()
          # Fail if any placeholder text remains
          bad = ['YOUR_', 'REPLACE_ME', 'TODO', 'FIXME', '<CHANGE']
          for word in bad:
              if word in content:
                  print(f'ERROR: placeholder found in $f: {word}')
                  sys.exit(1)
          print(f'OK: $f')
          "
          done

      - name: Apply migrations to staging DB
        if: github.event_name == 'push' && secrets.SUPABASE_STAGING_PROJECT_ID != ''
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_ID }} --password ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }} --yes
          supabase db push --password ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Job 6: Deploy to production ───────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [migrate-staging]
    if: github.ref == 'refs/heads/main' && secrets.SUPABASE_PROJECT_ID != ''
    environment:
      name: production
      url: ${{ vars.NEXT_PUBLIC_SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to production DB
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }} --yes
          supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy validate-otp    --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy upload-file     --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy post-confession --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

      - name: Smoke test production
        run: |
          SITE=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          # Auth routes must return 200
          curl -fsS "$SITE/auth/login"    > /dev/null && echo "✓ /auth/login"
          curl -fsS "$SITE/auth/callback" -o /dev/null -w "%{http_code}" | grep -qE "200|302" && echo "✓ /auth/callback"
          echo "Smoke tests passed"
